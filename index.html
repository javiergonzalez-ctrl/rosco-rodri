<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#050507" />
<title>El Rosco de Rodri — Despedida</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #050507;
    --bg-1: #0a0a12;
    --pink: #FF2D87;
    --magenta: #C724FF;
    --cyan: #00E5FF;
    --green: #34D399;
    --red: #FF3B5C;
    --gold: #FFD60A;
    --text: #F5F5F7;
    --text-dim: rgba(245, 245, 247, 0.55);
    --glass: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    color: var(--text);
    background: var(--bg-0);
    user-select: none;
    -webkit-user-select: none;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }
  button, input { font-family: inherit; }
  /* Disable hover effects on touch — they stick after tap on iOS.
     IMPORTANT: .letter uses transform: translate(-50%,-50%) for centering,
     so we reset only the scale, not the translate. */
  @media (hover: none) {
    .btn-primary:hover { transform: none; filter: none; }
    .qc-btn:hover { transform: none; filter: none; }
    .letter:hover {
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.18);
    }
  }
  body {
    position: relative;
    background:
      radial-gradient(circle at 15% 20%, rgba(199, 36, 255, 0.25), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(0, 229, 255, 0.18), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255, 45, 135, 0.12), transparent 60%),
      var(--bg-0);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, white, transparent),
      radial-gradient(1px 1px at 80% 70%, white, transparent),
      radial-gradient(1px 1px at 40% 80%, white, transparent),
      radial-gradient(2px 2px at 60% 20%, white, transparent),
      radial-gradient(1px 1px at 90% 40%, white, transparent),
      radial-gradient(1px 1px at 10% 90%, white, transparent),
      radial-gradient(1px 1px at 30% 10%, white, transparent);
    background-size: 800px 800px;
    opacity: 0.15;
    animation: drift 60s linear infinite;
    pointer-events: none;
  }
  @keyframes drift {
    from { transform: translate(0, 0); }
    to { transform: translate(-200px, -200px); }
  }

  /* Pantalla START */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 24px;
    transition: opacity 0.5s, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

  #screen-start h1 {
    font-size: clamp(48px, 9vw, 110px);
    font-weight: 900;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--pink), var(--magenta) 50%, var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
    line-height: 1;
  }
  #screen-start .subtitle {
    margin-top: 16px;
    font-size: clamp(14px, 1.4vw, 18px);
    color: var(--text-dim);
    text-align: center;
    max-width: 600px;
    font-weight: 500;
  }
  #screen-start .player-name {
    margin-top: 32px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 14px 22px;
    font-size: 16px;
    color: var(--text);
    font-family: inherit;
    font-weight: 500;
    width: 280px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, transform 0.2s;
  }
  #screen-start .player-name:focus { border-color: var(--pink); transform: scale(1.02); }
  #screen-start .player-name::placeholder { color: var(--text-dim); }

  .btn-primary {
    margin-top: 32px;
    background: linear-gradient(135deg, var(--pink), var(--magenta));
    color: white;
    border: none;
    border-radius: 999px;
    padding: 18px 48px;
    font-size: 18px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(255, 45, 135, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.2s;
    letter-spacing: -0.01em;
  }
  .btn-primary:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 16px 50px rgba(255, 45, 135, 0.6); }
  .btn-primary:active { transform: scale(0.97); }

  /* Pantalla GAME */
  #screen-game { padding: 0; }
  .game-wrapper {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 20px 32px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 30;
    pointer-events: none;
  }
  .topbar .player-tag {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
    pointer-events: auto;
  }
  .topbar .stats {
    display: flex; gap: 12px;
    pointer-events: auto;
  }
  .stat-pill {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 8px 14px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
    font-weight: 600;
  }
  .stat-pill .label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }
  .stat-pill .value { font-size: 18px; font-weight: 700; }
  .stat-pill.timer .value { font-variant-numeric: tabular-nums; }
  .stat-pill.timer.danger .value { color: var(--red); animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* ROSCO */
  .rosco {
    position: relative;
    width: min(80vh, 95vw);
    height: min(80vh, 95vw);
    max-width: 760px;
    max-height: 760px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .rosco-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0.4;
  }
  .player-avatar {
    position: absolute;
    width: 50%;
    height: 50%;
    max-width: 360px;
    max-height: 360px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow:
      0 0 0 3px rgba(255, 255, 255, 0.2),
      0 0 0 10px rgba(255, 45, 135, 0.3),
      0 30px 80px rgba(0, 0, 0, 0.6),
      0 0 120px rgba(255, 45, 135, 0.45);
    background: linear-gradient(135deg, rgba(255, 45, 135, 0.2), rgba(0, 229, 255, 0.2));
    z-index: 4;
    animation: avatarFloat 6s ease-in-out infinite;
  }
  .player-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  @keyframes avatarFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  .player-avatar .qc-letter-overlay {
    position: absolute;
    bottom: -8px;
    right: -8px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--magenta));
    border: 3px solid rgba(255, 255, 255, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    color: white;
    letter-spacing: -0.02em;
    box-shadow: 0 6px 20px rgba(255, 45, 135, 0.6);
    transform: scale(0);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .player-avatar .qc-letter-overlay.visible { transform: scale(1); }
  .letter {
    position: absolute;
    width: 11%;
    height: 11%;
    min-width: 38px;
    min-height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: clamp(14px, 2.4vw, 26px);
    color: var(--text);
    background: rgba(255, 255, 255, 0.04);
    border: 1.5px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    transform: translate(-50%, -50%);
    letter-spacing: -0.02em;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  }
  .letter:hover {
    transform: translate(-50%, -50%) scale(1.12);
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.4);
  }
  .letter.current {
    background: linear-gradient(135deg, var(--pink), var(--magenta));
    border-color: rgba(255, 255, 255, 0.7);
    box-shadow: 0 0 0 4px rgba(255, 45, 135, 0.3), 0 0 50px rgba(255, 45, 135, 0.6), 0 0 100px rgba(199, 36, 255, 0.4);
    color: white;
    animation: currentPulse 1.6s ease-in-out infinite;
    z-index: 5;
  }
  @keyframes currentPulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(255, 45, 135, 0.3), 0 0 50px rgba(255, 45, 135, 0.6), 0 0 100px rgba(199, 36, 255, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(255, 45, 135, 0.15), 0 0 70px rgba(255, 45, 135, 0.8), 0 0 120px rgba(199, 36, 255, 0.6); }
  }
  .letter.correct {
    background: linear-gradient(135deg, #10B981, #34D399);
    border-color: rgba(255, 255, 255, 0.5);
    color: white;
    box-shadow: 0 0 30px rgba(52, 211, 153, 0.5);
  }
  .letter.wrong {
    background: linear-gradient(135deg, #DC2626, #FF3B5C);
    border-color: rgba(255, 255, 255, 0.5);
    color: white;
    box-shadow: 0 0 30px rgba(255, 59, 92, 0.5);
  }
  .letter.skipped {
    background: linear-gradient(135deg, #F59E0B, #FFD60A);
    border-color: rgba(255, 255, 255, 0.5);
    color: #1a1a1a;
    box-shadow: 0 0 25px rgba(255, 214, 10, 0.4);
  }
  .letter.flip { animation: flipReveal 0.7s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes flipReveal {
    0% { transform: translate(-50%, -50%) rotateY(0deg) scale(1); }
    50% { transform: translate(-50%, -50%) rotateY(90deg) scale(1.3); }
    100% { transform: translate(-50%, -50%) rotateY(0deg) scale(1); }
  }

  /* CARD INFERIOR (chyron) */
  .question-card {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(20px);
    width: min(720px, 92vw);
    background: rgba(20, 20, 30, 0.78);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 24px;
    padding: 18px 24px 16px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.4s, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }
  .question-card.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .qc-mode {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .qc-question {
    font-size: clamp(15px, 1.7vw, 20px);
    line-height: 1.4;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 12px;
  }
  .qc-answer {
    font-size: clamp(18px, 2vw, 24px);
    font-weight: 800;
    background: linear-gradient(135deg, var(--green), var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 18px;
    min-height: 28px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s, transform 0.35s;
    letter-spacing: -0.01em;
  }
  .qc-answer.shown { opacity: 1; transform: translateY(0); }
  .qc-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .qc-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .qc-input:focus { border-color: var(--pink); background: rgba(255, 255, 255, 0.1); }
  .qc-input::placeholder { color: var(--text-dim); }
  .qc-input:disabled { opacity: 0.5; }
  .qc-btn.submit {
    background: linear-gradient(135deg, var(--pink), var(--magenta));
    color: white;
    border-color: transparent;
    box-shadow: 0 4px 20px rgba(255, 45, 135, 0.35);
    flex: 0 0 auto;
    min-width: 120px;
  }
  .qc-btn.override {
    background: rgba(52, 211, 153, 0.18);
    color: var(--green);
    border-color: rgba(52, 211, 153, 0.4);
  }
  .qc-actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .qc-btn {
    flex: 1;
    min-width: 90px;
    padding: 11px 14px;
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.15s, filter 0.2s, box-shadow 0.2s;
    background: var(--glass);
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .qc-btn:hover { transform: translateY(-1px); filter: brightness(1.15); }
  .qc-btn:active { transform: scale(0.96); }
  .qc-btn.reveal { background: rgba(255, 255, 255, 0.08); }
  .qc-btn.correct { background: linear-gradient(135deg, #10B981, #34D399); color: white; border-color: transparent; box-shadow: 0 4px 20px rgba(52, 211, 153, 0.3); }
  .qc-btn.wrong { background: linear-gradient(135deg, #DC2626, #FF3B5C); color: white; border-color: transparent; box-shadow: 0 4px 20px rgba(255, 59, 92, 0.3); }
  .qc-btn.skip { background: linear-gradient(135deg, #F59E0B, #FFD60A); color: #1a1a1a; border-color: transparent; box-shadow: 0 4px 20px rgba(255, 214, 10, 0.3); }

  /* End screen */
  #screen-end .end-card {
    background: rgba(20, 20, 30, 0.75);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 32px;
    padding: 48px 56px;
    text-align: center;
    max-width: 520px;
    box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
  }
  #screen-end h2 {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 900;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--pink), var(--magenta), var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1.05;
  }
  #screen-end .player-line { margin-top: 8px; color: var(--text-dim); font-size: 16px; font-weight: 500; }
  .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 36px 0 8px; }
  .score-grid .cell {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 18px 12px;
  }
  .score-grid .cell .num { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -0.03em; }
  .score-grid .cell .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-top: 6px; font-weight: 600; }
  .score-grid .cell.green .num { color: var(--green); }
  .score-grid .cell.red .num { color: var(--red); }
  .score-grid .cell.yellow .num { color: var(--gold); }

  /* Confetti */
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

  /* Image overlay on correct */
  .img-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(20,20,30,0.92) 0%, rgba(0,0,0,0.98) 70%);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .img-overlay.visible { opacity: 1; pointer-events: auto; }
  .img-overlay .img-card {
    position: relative;
    max-width: min(92vw, 760px);
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    transform: scale(0.88) translateY(20px);
    opacity: 0;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
  }
  .img-overlay.visible .img-card { transform: scale(1) translateY(0); opacity: 1; }
  .img-overlay img {
    max-width: 100%;
    max-height: 68vh;
    border-radius: 20px;
    box-shadow: 0 40px 120px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.08), 0 0 80px rgba(46,200,131,0.15);
    object-fit: contain;
  }
  .img-overlay .img-caption {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
  }
  .img-overlay .img-caption .cap-letter {
    font-size: clamp(14px, 1.6vw, 18px);
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .img-overlay .img-caption .cap-answer {
    font-size: clamp(28px, 4.2vw, 52px);
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #d8e8ff 60%, var(--cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .img-overlay .img-hint {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-top: 4px;
  }

  /* Responsive — iPhone first */
  @media (max-width: 700px) {
    /* Grid layout: [topbar] / [rosco centered in available space] / [card] */
    #screen-game {
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-areas: "top" "main" "card";
      align-items: stretch;
      justify-items: stretch;
      padding: 0;
      overflow: hidden;
    }
    .topbar {
      position: static;
      grid-area: top;
      padding: calc(env(safe-area-inset-top) + 8px) 12px 10px;
      gap: 8px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      background: rgba(5,5,7,0.6);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .topbar .player-tag { padding: 7px 12px; font-size: 11px; }
    .topbar .stats { gap: 6px; justify-content: flex-end; }
    .stat-pill { padding: 6px 9px; border-radius: 12px; min-width: 0; }
    .stat-pill .value { font-size: 14px; line-height: 1; }
    .stat-pill .label { font-size: 9px; }

    .game-wrapper {
      grid-area: main;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      height: auto;
      min-height: 0;
      width: auto;
      overflow: hidden;
    }
    /* Rosco sized off viewport (not off grid 1fr) so card height changes
       don't trigger a re-layout cascade on every tap. */
    .rosco {
      width: min(86vw, 50svh);
      height: min(86vw, 50svh);
      aspect-ratio: 1 / 1;
      max-width: 420px;
      flex-shrink: 0;
    }
    /* Hide the letter badge inside the avatar on mobile — redundant with
       the card's "EMPIEZA POR LA X" text and visually noisy. */
    .player-avatar .qc-letter-overlay { display: none; }
    /* 27 letters around radius 44% -> arc between centers = ~10.24% of circle width.
       Letter width must stay <= 10% to avoid overlap. */
    .letter {
      min-width: 30px;
      min-height: 30px;
      width: 10%;
      height: 10%;
      font-size: 13px;
      border-width: 1px;
    }
    .letter:active { transform: translate(-50%, -50%) scale(0.9); }
    .letter.current:active { transform: translate(-50%, -50%) scale(0.95); }
    .player-avatar {
      width: 38%;
      height: 38%;
    }
    .player-avatar .qc-letter-overlay {
      width: 44px;
      height: 44px;
      font-size: 20px;
      border-width: 2px;
      bottom: -4px;
      right: -4px;
    }

    .question-card {
      position: static;
      grid-area: card;
      transform: none;
      bottom: auto;
      left: auto;
      padding: 14px;
      width: calc(100% - 16px);
      max-width: 460px;
      box-sizing: border-box;
      border-radius: 18px;
      margin: 0 auto max(env(safe-area-inset-bottom), 12px);
      flex-shrink: 0;
      align-self: end;
      justify-self: center;
    }
    .question-card.visible { transform: none; }
    .qc-mode { font-size: 10px; margin-bottom: 6px; }
    .qc-question { font-size: 15px; line-height: 1.35; margin-bottom: 10px; }
    .qc-answer { font-size: 18px; margin-bottom: 12px; min-height: 22px; }
    .qc-input-row {
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }
    .qc-input { font-size: 16px; padding: 12px 14px; width: 100%; box-sizing: border-box; min-height: 44px; }
    .qc-btn.submit { min-width: 0; width: 100%; padding: 13px; font-size: 14px; min-height: 44px; }
    .qc-actions {
      gap: 6px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
    }
    .qc-actions .qc-btn { width: 100%; min-width: 0; }
    .qc-btn {
      font-size: 12px;
      padding: 12px 8px;
      border-radius: 12px;
      box-sizing: border-box;
      min-height: 44px;
    }
    .qc-btn:active { transform: scale(0.96); }

    #screen-start h1 { font-size: clamp(40px, 12vw, 56px); }
    #screen-start .subtitle { font-size: 14px; padding: 0 16px; }
    #screen-start .player-name { width: min(280px, calc(100vw - 48px)); }
    .btn-primary { padding: 16px 36px; font-size: 16px; min-height: 52px; }
    #screen-end .end-card { padding: 28px 20px; max-width: calc(100vw - 24px); }
    .score-grid { gap: 10px; }
    .score-grid .cell { padding: 14px 8px; }

    .img-overlay .img-card { gap: 16px; padding: 16px; }
    .img-overlay .img-hint { font-size: 10px; }
  }
  /* Very small (iPhone SE 320-375px) */
  @media (max-width: 380px) {
    .letter { font-size: 12px; min-width: 26px; min-height: 26px; }
    .qc-btn { font-size: 11px; padding: 11px 6px; }

    .topbar .player-tag { font-size: 10px; padding: 6px 10px; }

    .stat-pill .value { font-size: 13px; }
    .stat-pill .label { font-size: 8px; }
  }
  /* Landscape phones — short height: rosco + card side by side */
  @media (max-height: 500px) and (orientation: landscape) {
    #screen-game {
      grid-template-rows: auto 1fr;
      grid-template-columns: 1fr 1fr;
      grid-template-areas: "top top" "main card";
    }
    .topbar { padding: calc(env(safe-area-inset-top) + 4px) 12px 4px; }
    .game-wrapper { padding: 6px; }
    .rosco { width: auto; height: auto; max-width: 100%; max-height: 100%; }

      align-self: center;
      justify-self: stretch;

<body>

<!-- START -->
<div class="screen" id="screen-start">
  <h1>El Rosco de Rodri</h1>

  <input id="player-input" class="player-name" placeholder="Rodri" value="Rodri" maxlength="40" autocomplete="off" />
  <button class="btn-primary" id="btn-start">Empezar el rosco</button>
</div>

<!-- GAME -->
<div class="screen hidden" id="screen-game">
  <div class="topbar">
    <div class="player-tag" id="player-tag">Rodri</div>
    <div class="stats">
      <div class="stat-pill"><div><div class="label">Aciertos</div><div class="value" id="stat-correct" style="color: var(--green);">0</div></div></div>
      <div class="stat-pill"><div><div class="label">Fallos</div><div class="value" id="stat-wrong" style="color: var(--red);">0</div></div></div>
      <div class="stat-pill"><div><div class="label">Pasos</div><div class="value" id="stat-skipped" style="color: var(--gold);">0</div></div></div>
    </div>
  </div>
  <div class="game-wrapper">
    <div class="rosco" id="rosco">
      <svg class="rosco-svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.3" stroke-dasharray="0.5 1" />
      </svg>
      <div class="player-avatar" id="player-avatar">
        <img id="player-avatar-img" src="images/player.jpg" alt="Jugador" onerror="this.style.display='none'" />
        <div class="qc-letter-overlay" id="qc-letter-badge">A</div>
      </div>
    </div>
  </div>
  <div class="question-card" id="question-card">
    <div class="qc-mode" id="qc-mode">Empieza por la A</div>
    <div class="qc-question" id="qc-question">Pulsa una letra para empezar</div>
    <div class="qc-answer" id="qc-answer">…</div>
    <div class="qc-input-row">
      <input class="qc-input" id="qc-input" type="text" autocomplete="off" autocapitalize="words" placeholder="Escribe tu respuesta…" />

    </div>
    <div class="qc-actions">
      <button class="qc-btn skip" id="btn-skip">Pasapalabra</button>
      <button class="qc-btn reveal" id="btn-reveal">No lo sé · Mostrar</button>
      <button class="qc-btn override" id="btn-override" style="display:none;">Marcar como acierto</button>
    </div>
  </div>
</div>

<!-- END -->
<div class="screen hidden" id="screen-end">
  <div class="end-card">
    <h2 id="end-title">¡Rosco terminado!</h2>
    <div class="player-line" id="end-player">Rodri</div>
    <div class="score-grid">
      <div class="cell green"><div class="num" id="end-correct">0</div><div class="lbl">Aciertos</div></div>
      <div class="cell red"><div class="num" id="end-wrong">0</div><div class="lbl">Fallos</div></div>
      <div class="cell yellow"><div class="num" id="end-skipped">0</div><div class="lbl">Pasos</div></div>
    </div>
    <button class="btn-primary" id="btn-restart">Otra ronda</button>
  </div>
</div>

<canvas id="confetti"></canvas>

<div class="img-overlay" id="img-overlay">
  <div class="img-card">
    <img id="img-overlay-img" alt="" />
    <div class="img-caption">
      <div class="cap-letter" id="img-overlay-letter"></div>
      <div class="cap-answer" id="img-overlay-caption"></div>
    </div>
    <div class="img-hint">Toca o pulsa cualquier tecla para continuar</div>
  </div>
</div>

<script>
  const ROSCO = [
    {l:'A', mode:'Empieza por la A',         q:'Un primer amor nunca se olvida.', a:'Andrea Abad'},
    {l:'B', mode:'Empieza por la B',         q:'Tía que si te hablara ahora mismo, cancelarías la boda.', a:'Blanca'},
    {l:'C', mode:'Empieza por la C',         q:'Grupo de chicas que te has comido enter, hasta la que se apellida Blanco.', a:'Chichis'},
    {l:'D', mode:'Empieza por la D',         q:'Mayor fan de Torrente.', a:'Dani Güiza'},
    {l:'E', mode:'Empieza por la E',         q:'Una grande y libre.', a:'España'},
    {l:'F', mode:'Empieza por la F',         q:'Con ___ se vivía mejor.', a:'Franco'},
    {l:'G', mode:'Empieza por la G',         q:'"En el Frena llevas 5 temporadas sin marcar un…"', a:'Gol'},
    {l:'H', mode:'Empieza por la H',         q:'Pedro Sánchez es un...', a:'Hijo puta'},
    {l:'I', mode:'Empieza por la I',         q:'(Nos callamos todos.)', a:'Isa'},
    {l:'J', mode:'Empieza por la J',         q:'Pásame la…', a:'Juka'},
    {l:'K', mode:'Empieza por la K',         q:'A Paula Blanco le sobran unos cuantos…', a:'Kilos'},
    {l:'L', mode:'Empieza por la L',         q:'El sabio de Hortaleza, el zapatones.', a:'Luis Aragonés'},
    {l:'M', mode:'Empieza por la M',         q:'Si los ves venir de frente, te cambias de acera.', a:'Moros'},
    {l:'N', mode:'Empieza por la N',         q:'Si los ves venir de frente, te cambias de acera.', a:'Negros'},
    {l:'Ñ', mode:'Empieza por la Ñ',         q:'Javi González.', a:'Ñe'},
    {l:'O', mode:'Empieza por la O',         q:'"Todos a una, y puta…"', a:'Osasuna'},
    {l:'P', mode:'Empieza por la P',         q:'"Perdona, ¿me puedes quitar la mano de la…?"', a:'Pierna'},
    {l:'Q', mode:'Empieza por la Q',         q:'Si subes una foto sin camiseta, ¿qué título pones?', a:'Quieren cachi'},
    {l:'R', mode:'Empieza por la R',         q:'¿Con quién te hiciste tu primer trío?', a:'Rubén'},
    {l:'S', mode:'Empieza por la S',         q:'Nacionalidad de la vikinga que te liaste en las fiestas de Majadahonda.', a:'Sueca'},
    {l:'T', mode:'Empieza por la T',         q:'Lo único que te falta tatuarte ya: "Confratelli".', a:'Tatuaje'},
    {l:'U', mode:'Empieza por la U',         q:'Nacionalidad de tu ex roja.', a:'Uruguaya'},
    {l:'V', mode:'Empieza por la V',         q:'Empresa que estafa a todas las pymes españolas.', a:'Vadeseo'},
    {l:'W', mode:'Empieza por la W',         q:'Desde que estás con Ali no has probado una gota de…', a:'Whiskey'},
    {l:'X', mode:'Empieza por la X',         q:'"Racista" queda muy feo, mejor di…', a:'Xenófobo'},
    {l:'Y', mode:'Empieza por la Y',         q:'Tu ministra favorita.', a:'Yolanda Díaz'},
    {l:'Z', mode:'Empieza por la Z',         q:'Primera prueba: buscar…', a:'Zorritas'}
  ];

  // ---- Auth gate (client-side, simple) ----
  const ACCESS_USER = 'Rodrygo';
  const ACCESS_PASS = 'Hooka';
  (function authGate() {
    if (sessionStorage.getItem('rosco_auth') === ACCESS_USER + ':' + ACCESS_PASS) return;
    const tries = parseInt(sessionStorage.getItem('rosco_tries') || '0', 10);
    if (tries >= 5) {
      document.documentElement.innerHTML = '<body style="background:#000;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:24px;">Bloqueado.</body>';
      throw new Error('blocked');
    }
    const u = prompt('Usuario:');
    const p = prompt('Contraseña:');
    if (u !== ACCESS_USER || p !== ACCESS_PASS) {
      sessionStorage.setItem('rosco_tries', String(tries + 1));
      document.documentElement.innerHTML = '<body style="background:#000;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:24px;">Acceso denegado. Recarga para reintentar.</body>';
      throw new Error('denied');
    }
    sessionStorage.setItem('rosco_auth', ACCESS_USER + ':' + ACCESS_PASS);
    sessionStorage.removeItem('rosco_tries');
  })();

  const state = {
    status: {}, // letterIndex -> 'pending' | 'correct' | 'wrong' | 'skipped'
    current: null,
    correct: 0,
    wrong: 0,
    skipped: 0,
    started: false,
    player: 'Rodri'
  };

  // ---- DOM ----
  const $ = id => document.getElementById(id);
  const screenStart = $('screen-start');
  const screenGame = $('screen-game');
  const screenEnd = $('screen-end');

  // ---- Build rosco letters around circle ----
  function buildRosco() {
    const rosco = $('rosco');
    const N = ROSCO.length;
    const radiusPct = 44;
    ROSCO.forEach((item, i) => {
      const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
      const x = 50 + radiusPct * Math.cos(angle);
      const y = 50 + radiusPct * Math.sin(angle);
      const el = document.createElement('button');
      el.className = 'letter';
      el.textContent = item.l;
      el.style.left = x + '%';
      el.style.top = y + '%';
      el.dataset.idx = i;
      el.addEventListener('click', () => onLetterClick(i));
      rosco.appendChild(el);
      state.status[i] = 'pending';
    });
  }

  function getLetterEl(i) {
    return document.querySelector('.letter[data-idx="' + i + '"]');
  }

  // ---- Haptics (Android / future iOS) ----
  function haptic(pattern) {
    try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
  }

  // ---- Sound (WebAudio, no external) ----
  let audioCtx;
  function unlockAudio() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (e) {}
  }
  // Unlock on first user gesture (iOS requirement)
  ['pointerdown', 'touchstart', 'keydown'].forEach(ev =>
    window.addEventListener(ev, unlockAudio, { once: true, passive: true })
  );
  function beep(freq, dur = 0.12, type = 'sine', vol = 0.15) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.frequency.value = freq;
      osc.type = type;
      g.gain.value = vol;
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      osc.connect(g).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    } catch (e) {}
  }
  // "Sad trombone" — 4 descending notes with vibrato + brass-y sawtooth
  function sadTrombone() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtx;
      const t0 = ctx.currentTime;
      // descending notes (Hz) and their start offsets (s)
      const notes = [
        { f: 311, t: 0.00, d: 0.22 },  // Eb4
        { f: 277, t: 0.20, d: 0.22 },  // C#4
        { f: 233, t: 0.40, d: 0.24 },  // Bb3
        { f: 196, t: 0.60, d: 0.55 }   // G3 (long, with bend)
      ];
      const master = ctx.createGain();
      master.gain.value = 0.22;
      master.connect(ctx.destination);
      notes.forEach((n, i) => {
        const start = t0 + n.t;
        const end = start + n.d;
        // saw + slight detuned saw = brass
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        osc1.type = 'sawtooth'; osc2.type = 'sawtooth';
        osc1.frequency.setValueAtTime(n.f, start);
        osc2.frequency.setValueAtTime(n.f * 1.005, start);
        // pitch bend down on the last note (the "waaah")
        if (i === notes.length - 1) {
          osc1.frequency.exponentialRampToValueAtTime(n.f * 0.78, end);
          osc2.frequency.exponentialRampToValueAtTime(n.f * 0.78 * 1.005, end);
        }
        // vibrato
        const lfo = ctx.createOscillator();
        const lfoGain = ctx.createGain();
        lfo.frequency.value = 5.5;
        lfoGain.gain.value = n.f * 0.015;
        lfo.connect(lfoGain).connect(osc1.frequency);
        lfo.connect(lfoGain).connect(osc2.frequency);
        // amp envelope
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.5, start + 0.03);
        g.gain.setValueAtTime(0.5, end - 0.08);
        g.gain.exponentialRampToValueAtTime(0.0001, end);
        // gentle lowpass for warmth
        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 1600;
        osc1.connect(lp); osc2.connect(lp);
        lp.connect(g).connect(master);
        osc1.start(start); osc2.start(start); lfo.start(start);
        osc1.stop(end + 0.02); osc2.stop(end + 0.02); lfo.stop(end + 0.02);
      });
    } catch (e) {}
  }

  const sfx = {
    click: () => { beep(880, 0.06, 'square', 0.08); haptic(8); },
    correct: () => { beep(880, 0.1, 'triangle', 0.18); setTimeout(() => beep(1320, 0.18, 'triangle', 0.18), 90); haptic([14, 40, 14]); },
    wrong: () => { sadTrombone(); haptic([60, 60, 60, 60, 120]); },
    skip: () => { beep(660, 0.12, 'triangle', 0.15); haptic(20); },
    win: () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'triangle', 0.2), i * 130)); haptic([20, 60, 20, 60, 40]); }
  };

  // ---- Game flow ----
  function startGame() {
    const name = $('player-input').value.trim();
    if (name) state.player = name;
    $('player-tag').textContent = '🎩 ' + state.player;
    screenStart.classList.add('hidden');
    screenGame.classList.remove('hidden');
    state.started = true;
    setTimeout(() => goToLetter(0), 400);
  }

  function onLetterClick(i) {
    if (!state.started) return;
    sfx.click();
    const st = state.status[i];
    if (st === 'correct' || st === 'wrong') {
      // Re-mostrar la foto de una letra ya respondida sin cambiar su estado
      state.current = i;
      tryShowImage(i, () => {});
      return;
    }
    goToLetter(i);
  }

  function goToLetter(i) {
    // clear previous current
    document.querySelectorAll('.letter.current').forEach(el => el.classList.remove('current'));
    state.current = i;
    const item = ROSCO[i];
    const el = getLetterEl(i);
    if (state.status[i] === 'pending' || state.status[i] === 'skipped') {
      el.classList.add('current');
    }
    // populate question card
    const badge = $('qc-letter-badge');
    badge.textContent = item.l;
    badge.classList.remove('visible');
    requestAnimationFrame(() => badge.classList.add('visible'));
    $('qc-mode').textContent = item.mode;
    $('qc-question').textContent = item.q;
    $('qc-answer').textContent = item.a;
    $('qc-answer').classList.remove('shown');
    const input = $('qc-input');
    input.value = '';
    input.disabled = false;
    $('btn-submit').disabled = false;
    $('btn-override').style.display = 'none';
    const card = $('question-card');
    card.classList.remove('visible');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.classList.add('visible');
      // focus input on desktop only (avoid keyboard popping on mobile auto)
      if (window.matchMedia('(min-width: 700px)').matches) {
        setTimeout(() => input.focus(), 250);
      }
    }));
  }

  // ---- Answer matching ----
  function normalize(s) {
    return s
      .toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '') // strip accents
      .replace(/[^a-z0-9ñ\s]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }
  function checkAnswer(guess, correct) {
    const g = normalize(guess);
    const c = normalize(correct);
    if (!g) return false;
    if (g === c) return true;
    // token match: every significant token of correct must appear in guess
    const stop = new Set(['de', 'la', 'el', 'los', 'las', 'un', 'una']);
    const cTokens = c.split(' ').filter(t => t.length > 1 && !stop.has(t));
    if (cTokens.length === 0) return g === c;
    const gTokens = new Set(g.split(' '));
    return cTokens.every(t => {
      if (gTokens.has(t)) return true;
      // allow close match for short tokens
      for (const gt of gTokens) {
        if (gt === t) return true;
        if (t.length >= 4 && gt.length >= 4 && (gt.includes(t) || t.includes(gt))) return true;
      }
      return false;
    });
  }

  function submitGuess() {
    const i = state.current;
    if (i === null) return;
    const item = ROSCO[i];
    const guess = $('qc-input').value;
    if (!guess.trim()) return;
    const ok = checkAnswer(guess, item.a);
    $('qc-input').disabled = true;
    $('btn-submit').disabled = true;
    $('qc-answer').classList.add('shown');
    if (ok) {
      // small delay for suspense
      setTimeout(() => markLetter('correct'), 700);
    } else {
      // show override option in case our normalizer is wrong
      $('btn-override').style.display = 'inline-block';
      setTimeout(() => markLetter('wrong'), 1400);
    }
  }

  function overrideCorrect() {
    // promote a wrong to correct
    const i = state.current;
    if (i === null) return;
    if (state.status[i] === 'wrong') {
      state.wrong = Math.max(0, state.wrong - 1);
      const el = getLetterEl(i);
      el.classList.remove('wrong');
      state.status[i] = 'correct';
      state.correct++;
      el.classList.add('correct', 'flip');
      setTimeout(() => el.classList.remove('flip'), 700);
      sfx.correct();
      refreshStats();
      tryShowImage(i, () => {});
    }
  }

  function markLetter(status) {
    const i = state.current;
    if (i === null) return;
    const el = getLetterEl(i);
    el.classList.remove('current', 'correct', 'wrong', 'skipped');
    el.classList.add(status, 'flip');
    setTimeout(() => el.classList.remove('flip'), 700);

    // adjust counters: if it was previously skipped, decrement skipped
    const prev = state.status[i];
    if (prev === 'skipped' && status !== 'skipped') state.skipped = Math.max(0, state.skipped - 1);

    state.status[i] = status;
    if (status === 'correct') { state.correct++; sfx.correct(); }
    else if (status === 'wrong') { state.wrong++; sfx.wrong(); }
    else if (status === 'skipped') { state.skipped++; sfx.skip(); }

    refreshStats();
    if (status === 'correct') {
      tryShowImage(i, () => advance());
    } else {
      advance();
    }
  }

  // ---- Image overlay on correct ----
  // For each letter, we look for ./images/{LETTER}.{ext} in this order.
  const IMG_EXTS = ['jpg', 'jpeg', 'png', 'webp', 'gif'];
  const imgCache = {}; // letter -> resolved url or false

  function findImage(letter) {
    if (imgCache[letter] !== undefined) {
      return Promise.resolve(imgCache[letter]);
    }
    const safe = letter === 'Ñ' ? 'N_TILDE' : letter;
    const candidates = [];
    [letter, safe, letter.toLowerCase(), safe.toLowerCase()].forEach(name => {
      IMG_EXTS.forEach(ext => candidates.push('images/' + name + '.' + ext));
    });
    return new Promise(resolve => {
      let i = 0;
      function tryNext() {
        if (i >= candidates.length) { imgCache[letter] = false; resolve(false); return; }
        const url = candidates[i++];
        const img = new Image();
        img.onload = () => { imgCache[letter] = url; resolve(url); };
        img.onerror = tryNext;
        img.src = url;
      }
      tryNext();
    });
  }

  function tryShowImage(idx, done) {
    const item = ROSCO[idx];
    findImage(item.l).then(url => {
      if (!url) { setTimeout(done, 200); return; }
      const overlay = $('img-overlay');
      $('img-overlay-img').src = url;
      $('img-overlay-letter').textContent = item.l + ' · Letra ' + item.l;
      $('img-overlay-caption').textContent = item.a;
      overlay.classList.add('visible');
      fireConfetti();
      let armed = false;
      setTimeout(() => { armed = true; }, 500);
      const dismiss = () => {
        if (!armed) return;
        overlay.classList.remove('visible');
        overlay.removeEventListener('click', dismiss);
        overlay.removeEventListener('touchstart', dismiss);
        window.removeEventListener('keydown', keyDismiss);
        setTimeout(done, 400);
      };
      const keyDismiss = (e) => { e.preventDefault(); dismiss(); };
      overlay.addEventListener('click', dismiss);
      overlay.addEventListener('touchstart', dismiss, { passive: true });
      window.addEventListener('keydown', keyDismiss);
    });
  }

  function refreshStats() {
    $('stat-correct').textContent = state.correct;
    $('stat-wrong').textContent = state.wrong;
    $('stat-skipped').textContent = state.skipped;
  }

  function advance() {
    // find next letter that's pending or skipped, after current
    const N = ROSCO.length;
    let next = -1;
    for (let k = 1; k <= N; k++) {
      const idx = (state.current + k) % N;
      if (state.status[idx] === 'pending') { next = idx; break; }
    }
    if (next === -1) {
      // no pending → check skipped
      for (let k = 1; k <= N; k++) {
        const idx = (state.current + k) % N;
        if (state.status[idx] === 'skipped') { next = idx; break; }
      }
    }
    if (next === -1) {
      // done
      $('question-card').classList.remove('visible');
      setTimeout(() => endGame(), 500);
      return;
    }
    setTimeout(() => goToLetter(next), 450);
  }

  function endGame() {
    screenGame.classList.add('hidden');
    screenEnd.classList.remove('hidden');
    $('end-title').textContent = '¡Rosco terminado!';
    $('end-player').textContent = state.player;
    $('end-correct').textContent = state.correct;
    $('end-wrong').textContent = state.wrong;
    $('end-skipped').textContent = state.skipped;
    if (state.correct >= ROSCO.length) {
      $('end-title').textContent = '¡PASAPALABRA!';
    }
    sfx.win();
    fireConfetti();
  }

  function restart() {
    // reset state
    state.correct = 0; state.wrong = 0; state.skipped = 0;
    state.current = null;
    Object.keys(state.status).forEach(k => state.status[k] = 'pending');
    document.querySelectorAll('.letter').forEach(el => el.classList.remove('correct', 'wrong', 'skipped', 'current'));
    refreshStats();
    screenEnd.classList.add('hidden');
    screenGame.classList.remove('hidden');
    setTimeout(() => goToLetter(0), 400);
  }

  // ---- Confetti ----
  const confettiCanvas = $('confetti');
  const cctx = confettiCanvas.getContext('2d');
  function resizeCanvas() {
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  let particles = [];
  function fireConfetti() {
    const colors = ['#FF2D87', '#C724FF', '#00E5FF', '#FFD60A', '#34D399'];
    for (let i = 0; i < 220; i++) {
      particles.push({
        x: window.innerWidth / 2 + (Math.random() - 0.5) * 100,
        y: window.innerHeight / 2,
        vx: (Math.random() - 0.5) * 18,
        vy: (Math.random() - 0.5) * 18 - 6,
        g: 0.35,
        size: Math.random() * 8 + 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.3,
        life: 0,
        maxLife: 220 + Math.random() * 80
      });
    }
    if (!particles._raf) animateConfetti();
  }
  function animateConfetti() {
    particles._raf = true;
    cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    particles = particles.filter(p => p.life < p.maxLife);
    particles.forEach(p => {
      p.vy += p.g;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      p.life++;
      const alpha = 1 - (p.life / p.maxLife);
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot);
      cctx.globalAlpha = alpha;
      cctx.fillStyle = p.color;
      cctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      cctx.restore();
    });
    if (particles.length > 0) requestAnimationFrame(animateConfetti);
    else particles._raf = false;
  }

  // ---- Preload images in background so reveal is instant ----
  function preloadImages() {
    ROSCO.forEach((item, idx) => {
      // stagger slightly so initial render isn't choked
      setTimeout(() => findImage(item.l), idx * 30);
    });
  }

  // ---- Keep input visible above iOS keyboard ----
  function wireInputKeyboard() {
    const input = $('qc-input');
    input.addEventListener('focus', () => {
      setTimeout(() => {
        try { input.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (e) {}
      }, 300);
    });
  }

  // ---- Wire up ----
  buildRosco();
  preloadImages();
  wireInputKeyboard();
  $('btn-start').addEventListener('click', startGame);
  $('player-input').addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });
  $('btn-submit').addEventListener('click', submitGuess);
  $('btn-skip').addEventListener('click', () => markLetter('skipped'));
  $('btn-reveal').addEventListener('click', () => {
    $('qc-answer').classList.add('shown');
    $('qc-input').disabled = true;
    $('btn-submit').disabled = true;
    const i = state.current;
    setTimeout(() => tryShowImage(i, () => markLetter('wrong')), 800);
  });
  $('btn-override').addEventListener('click', overrideCorrect);
  $('qc-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); submitGuess(); }
  });
  $('btn-restart').addEventListener('click', restart);
</script>
</body>
</html>
